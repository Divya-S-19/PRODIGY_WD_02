<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⏱️ Stopwatch</h1>
        
        <div class="display">
            <div class="time" id="display">00:00:00</div>
            <div class="milliseconds" id="milliseconds">00</div>
        </div>

        <div class="controls">
            <button id="startPause" class="btn start">Start</button>
            <button id="reset" class="btn reset">Reset</button>
            <button id="lap" class="btn lap" disabled>Lap</button>
        </div>

        <div class="laps">
            <h3>Laps</h3>
            <ul id="lapsList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
